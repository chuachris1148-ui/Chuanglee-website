backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  # ─────────────────────────────────────────
  # SITE-WIDE SETTINGS
  # ─────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:

      - name: "global"
        label: "Global (nav, footer, topbar)"
        file: "content/global.json"
        fields:
          - label: "Brand name"
            name: "brand_name"
            widget: "string"
            default: "Chuanglee"
          - label: "Est. year"
            name: "est_year"
            widget: "string"
            default: "1989"
          - label: "Phone number"
            name: "phone"
            widget: "string"
            default: "0845 388 1688"
          - label: "Sales email"
            name: "email"
            widget: "string"
            default: "sales@chuanglee.co.uk"
          - label: "Address line 1"
            name: "address_1"
            widget: "string"
            default: "Unit 7-9 Meridian Trading Estate"
          - label: "Address line 2"
            name: "address_2"
            widget: "string"
            default: "Bugsby Way, London SE7 7SJ"
          - label: "Nav CTA button text"
            name: "nav_cta"
            widget: "string"
            default: "Order Online ↗"
          - label: "Topbar messages"
            name: "topbar_messages"
            widget: "list"
            field:
              label: "Message"
              name: "message"
              widget: "string"
          - label: "Footer copyright years"
            name: "copyright"
            widget: "string"
            default: "1989–2025"

  # ─────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────
  - name: "pages"
    label: "Pages"
    files:

      - name: "home"
        label: "Home"
        file: "content/home.json"
        fields:
          - label: "Hero — headline line 1"
            name: "hero_line1"
            widget: "string"
            default: "The flavour"
          - label: "Hero — headline line 2 (italic)"
            name: "hero_line2_italic"
            widget: "string"
            default: "of East Asia,"
          - label: "Hero — headline line 3"
            name: "hero_line3"
            widget: "string"
            default: "from soil to stove."
          - label: "Hero — sub-headline"
            name: "hero_sub"
            widget: "string"
            default: "Three generations. Direct from manufacturer."
          - label: "Hero — lede paragraph"
            name: "hero_lede"
            widget: "text"
            default: "UK importer, manufacturing partner, and foodservice distributor for authentic East Asian ingredients. 30+ heritage brands, a family farm in Thailand, and 3,000+ product lines in stock."
          - label: "Hero — primary CTA"
            name: "hero_cta_primary"
            widget: "string"
            default: "Explore the Catalogue →"
          - label: "Hero — secondary CTA"
            name: "hero_cta_secondary"
            widget: "string"
            default: "Open a Trade Account"
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Sub-label", name: "sub", widget: "string" }

      # ─────────────────────────────────────
      # BRANDS PAGE
      # ─────────────────────────────────────
      - name: "brands"
        label: "Brands"
        file: "content/brands.json"
        fields:
          - label: "Hero — headline"
            name: "hero_h1"
            widget: "string"
            default: "A pantry of icons, sourced direct."
          - label: "Hero — lede"
            name: "hero_lede"
            widget: "text"
            default: "Over thirty heritage Asian brands distributed under one roof."
          - label: "Spotlight — tag"
            name: "spot_tag"
            widget: "string"
            default: "Brand Spotlight · This Month"
          - label: "Spotlight — brand name"
            name: "spot_brand"
            widget: "string"
            default: "AROY-D"
          - label: "Spotlight — description"
            name: "spot_desc"
            widget: "text"
            default: "Pure-pressed, no stabilisers, no preservatives. Trusted by Michelin chefs and 450+ UK kitchens."
          - label: "Spotlight — CTA text"
            name: "spot_cta"
            widget: "string"
            default: "Shop AROY-D →"
          - label: "Brands"
            name: "brands"
            widget: "list"
            fields:
              - { label: "Number (e.g. No. 01)", name: "num", widget: "string" }
              - { label: "CJK character", name: "cjk", widget: "string" }
              - { label: "Brand name", name: "name", widget: "string" }
              - { label: "Origin & year", name: "origin", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Category tags", name: "tags", widget: "string" }
              - label: "Card style"
                name: "style"
                widget: "select"
                options: ["default", "dark", "red", "gold"]
                default: "default"

      # ─────────────────────────────────────
      # FARM PAGE
      # ─────────────────────────────────────
      - name: "farm"
        label: "The Farm"
        file: "content/farm.json"
        fields:
          - label: "Hero — headline line 1"
            name: "hero_line1"
            widget: "string"
            default: "Suree's Farm,"
          - label: "Hero — headline italic phrase"
            name: "hero_italic"
            widget: "string"
            default: "one hour"
          - label: "Hero — headline line 2"
            name: "hero_line2"
            widget: "string"
            default: "from Bangkok."
          - label: "Hero — lede"
            name: "hero_lede"
            widget: "text"
            default: "Chuanglee operates alongside Suree's Farm — a family-run vegetable farm and packing house in Chachoengsao, Thailand."
          - label: "Section — eyebrow"
            name: "eyebrow"
            widget: "string"
            default: "Suree's Farm · Chachoengsao"
          - label: "Section — paragraph 1"
            name: "para_1"
            widget: "text"
            default: "One hour outside Bangkok, our family farm and packing house grows organic Thai produce alongside trusted local farmers."
          - label: "Section — paragraph 2"
            name: "para_2"
            widget: "text"
            default: "For decades, Granny Suree has personally overseen the pack house, partnering with local farmers while growing her own organic produce."
          - label: "Pull quote"
            name: "quote"
            widget: "string"
            default: "Family farms it, family packs it, family delivers it."
          - label: "CTA — headline"
            name: "cta_h3"
            widget: "string"
            default: "Need a specific herb for your menu?"
          - label: "CTA — description"
            name: "cta_desc"
            widget: "text"
            default: "Talk to us. Granny Suree's farm and our partner farmer network can grow Thai herbs to a restaurant's specification."
          - label: "CTA — button text"
            name: "cta_btn"
            widget: "string"
            default: "Discuss Custom Sourcing →"

      # ─────────────────────────────────────
      # CONTACT PAGE
      # ─────────────────────────────────────
      - name: "contact"
        label: "Contact"
        file: "content/contact.json"
        fields:
          - label: "Eyebrow"
            name: "eyebrow"
            widget: "string"
            default: "Get in Touch"
          - label: "Headline"
            name: "headline"
            widget: "string"
            default: "Let's build something delicious."
          - label: "Lead paragraph"
            name: "lead"
            widget: "text"
            default: "Whether you're an independent kitchen, a multi-site group, a wholesale buyer or a brand exploring bespoke product development — our team speaks Thai, Mandarin, Cantonese and English."
          - label: "Delivery info"
            name: "delivery"
            widget: "string"
            default: "London & Greater London — multiple times weekly. UK nationwide — once a week."
          - label: "Minimum order"
            name: "min_order"
            widget: "string"
            default: "£300 minimum order for own-fleet delivery"
          - label: "Form heading"
            name: "form_heading"
            widget: "string"
            default: "Open an Account"
          - label: "Form sub-line"
            name: "form_sub"
            widget: "string"
            default: "Tell us about your business and we'll be in touch within one working day."
          - label: "Submit button text"
            name: "form_submit"
            widget: "string"
            default: "Send Enquiry →"
